name: Publicar no NPM e GitHub Packages 🚀

on:
  push:
    tags:
      - '*.*.*' # Escuta tags no formato Semantic Versioning ex: 1.0.0, 1.2.3

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Setup e Build
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências (limpas)
        run: npm ci 

      - name: Rodar o Build
        run: npm run build

      # Publicar no NPM
      - name: Configurar Autenticação NPM
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verificar autenticação no NPM
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publicar no NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publicar no GitHub Packages
      - name: Configurar Autenticação GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publicar no GitHub
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}